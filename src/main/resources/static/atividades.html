<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividades - Organização Acadêmica</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
    <style>
        .disciplina-section {
            margin-bottom: 20px;
        }

        .disciplina-title {
            background: #34495e;
            color: white;
            padding: 12px 15px;
            border-radius: 4px;
            margin-bottom: 10px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
        }

        .disciplina-title:hover {
            background: #2c3e50;
        }

        .aulas-list {
            display: none;
            padding-left: 10px;
        }

        .aulas-list.show {
            display: block;
        }

        .aula-group {
            background: #f9f9f9;
            border-left: 4px solid #3498db;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 4px;
        }

        .aula-group h4 {
            margin: 0 0 10px 0;
            color: #2c3e50;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .aula-group h4:hover {
            color: #3498db;
        }

        .atividades-list {
            display: none;
            margin-top: 10px;
        }

        .atividades-list.show {
            display: block;
        }

        .atividade-item {
            background: white;
            border: 1px solid #ecf0f1;
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .atividade-item.concluida {
            background: #f0f9ff;
            opacity: 0.7;
        }

        .atividade-info {
            flex: 1;
        }

        .atividade-info h5 {
            margin: 0 0 5px 0;
            color: #2c3e50;
        }

        .atividade-info p {
            margin: 3px 0;
            font-size: 13px;
            color: #7f8c8d;
        }

        .atividade-actions {
            display: flex;
            gap: 5px;
        }

        .atividade-actions button {
            padding: 6px 10px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <header>
        <h1>📚 Organização Acadêmica</h1>
        <nav>
            <a href="index.html">Dashboard</a>
            <a href="periodos.html">Períodos</a>
            <a href="disciplinas.html">Disciplinas</a>
            <a href="aulas.html">Aulas</a>
            <a href="atividades.html">Atividades</a>
        </nav>
    </header>

    <div class="container">
        <div class="alert"></div>

        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2>Atividades do Período: <span id="periodoNome">-</span></h2>
                <button onclick="abrirFormulario()">+ Nova Atividade</button>
            </div>

            <div id="noPeriodo" class="empty-state">
                <p>Nenhum período ativo. Ative um em <a href="periodos.html">Períodos</a>.</p>
            </div>

            <div id="atividadesContainer"></div>
        </div>
    </div>

    <div id="atividadeModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="fecharFormulario()">&times;</span>
            <h2 id="formTitulo">Nova Atividade</h2>
            <form id="atividadeForm" onsubmit="salvarAtividade(event)">
                <div class="form-group">
                    <label for="disciplinaSelect">Disciplina</label>
                    <select id="disciplinaSelect" required>
                        <option value="">Selecione uma disciplina...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="aulaSelect">Aula</label>
                    <select id="aulaSelect" required>
                        <option value="">Selecione uma disciplina primeiro...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="titulo">Título</label>
                    <input type="text" id="titulo" required>
                </div>
                <div class="form-group">
                    <label for="descricao">Descrição</label>
                    <textarea id="descricao"></textarea>
                </div>
                <div class="form-group">
                    <label for="dataEntrega">Data de Entrega</label>
                    <input type="date" id="dataEntrega" required>
                </div>
                <div class="form-group">
                    <label for="tipo">Tipo</label>
                    <select id="tipo" required>
                        <option value="">Selecione...</option>
                        <option value="ATIVIDADE">Atividade</option>
                        <option value="PROVA">Prova</option>
                        <option value="TRABALHO">Trabalho</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="nota">Nota (opcional)</label>
                    <input type="number" id="nota" min="0" max="10" step="0.5">
                </div>
                <div class="btn-group">
                    <button type="submit">Salvar</button>
                    <button type="button" onclick="fecharFormulario()">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/atividades.js"></script>
</body>
</html>
