<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Períodos - Organização Acadêmica</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
</head>
<body>
    <header>
        <h1>📚 Organização Acadêmica</h1>
        <nav>
            <a href="index.html">Dashboard</a>
            <a href="periodos.html">Períodos</a>
            <a href="disciplinas.html">Disciplinas</a>
            <a href="aulas.html">Aulas</a>
            <a href="atividades.html">Atividades</a>
        </nav>
    </header>

    <div class="container">
        <div class="alert"></div>

        <div class="card">
            <h2>Gerenciar Períodos</h2>
            <button onclick="abrirFormulario()">+ Novo Período</button>
            <div id="listaPeriodos" class="empty-state">
                <p>Carregando...</p>
            </div>
        </div>
    </div>

    <div id="periodoModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="fecharFormulario()">&times;</span>
            <h2 id="formTitulo">Novo Período</h2>
            <form id="periodoForm" onsubmit="salvarPeriodo(event)">
                <div class="form-group">
                    <label for="nome">Nome (ex: 2026.1)</label>
                    <input type="text" id="nome" required>
                </div>
                <div class="form-group">
                    <label for="dataInicio">Data de Início</label>
                    <input type="date" id="dataInicio" required>
                </div>
                <div class="form-group">
                    <label for="dataFim">Data de Fim</label>
                    <input type="date" id="dataFim" required>
                </div>
                <div class="btn-group">
                    <button type="submit">Salvar</button>
                    <button type="button" onclick="fecharFormulario()">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/periodos.js"></script>
</body>
</html>
